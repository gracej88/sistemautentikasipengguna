<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>User Registration</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
      }
      .card {
        border: none;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark shadow-sm">
      <div class="container">
        <span class="navbar-brand mb-0 h1">User System</span>
      </div>
    </nav>

    <!-- FORM -->
    <div
      class="container d-flex align-items-center justify-content-center"
      style="min-height: 90vh"
    >
      <div class="col-md-5">
        <div class="card shadow-lg rounded-4">
          <div class="card-body p-4">
            <h3 class="text-center mb-4">Create Account</h3>

            <form method="POST" action="/register" onsubmit="showLoading()">
              <!-- EMAIL -->
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input
                  type="email"
                  name="email"
                  class="form-control"
                  required
                />
              </div>

              <!-- PASSWORD -->
              <div class="mb-3">
                <label class="form-label">Password</label>

                <div class="position-relative">
                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control pe-5"
                    required
                  />

                  <i
                    id="toggleIcon"
                    class="bi bi-eye"
                    onclick="togglePassword()"
                    style="
                      position: absolute;
                      top: 50%;
                      right: 15px;
                      transform: translateY(-50%);
                      cursor: pointer;
                      font-size: 18px;
                      color: #555;
                    "
                  >
                  </i>
                </div>
              </div>

              <!-- PHONE -->
              <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control" required />
              </div>

              <!-- BUTTON -->
              <button
                id="submitBtn"
                type="submit"
                class="btn btn-primary w-100"
              >
                Register
              </button>
            </form>

            <!-- MESSAGE -->
            {% if message %}
            <div
              class="alert mt-3 {% if 'successfully' in message %}alert-success{% else %}alert-danger{% endif %}"
            >
              {{ message }}
            </div>
            {% endif %}
          </div>
        </div>

        <!-- FOOTER -->
        <p class="text-center text-white mt-3 small">
          Software Testing Project • Flask UI
        </p>
      </div>
    </div>

    <!-- JS -->
    <script>
      function togglePassword() {
        const pw = document.getElementById("password");
        const icon = document.getElementById("toggleIcon");

        if (pw.type === "password") {
          pw.type = "text";
          icon.classList.remove("bi-eye");
          icon.classList.add("bi-eye-slash");
        } else {
          pw.type = "password";
          icon.classList.remove("bi-eye-slash");
          icon.classList.add("bi-eye");
        }
      }

      function showLoading() {
        const btn = document.getElementById("submitBtn");
        btn.innerHTML = "Processing...";
        btn.disabled = true;
      }
    </script>
  </body>
</html>
